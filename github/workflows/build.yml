name: Build APK RENCO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Siapkan folder www
        run: |
          mkdir -p www

          # Cari file HTML utama (index.html atau file .html lainnya)
          if [ -f "index.html" ]; then
            cp index.html www/index.html
          elif [ -f "KOPERASI_RENCO-1.html" ]; then
            cp KOPERASI_RENCO-1.html www/index.html
          else
            HTML_FILE=$(find . -maxdepth 1 -name "*.html" | head -n 1)
            if [ -n "$HTML_FILE" ]; then
              cp "$HTML_FILE" www/index.html
              echo "Copied $HTML_FILE â†’ www/index.html"
            else
              echo "ERROR: Tidak ada file HTML ditemukan!"
              exit 1
            fi
          fi

          echo "âœ… www/index.html siap"

      - name: Buat capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.renco.koperasi",
            "appName": "Koperasi RENCO",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": false
            }
          }
          EOF

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4

      - name: Tambahkan platform Android
        run: |
          npx cap add android

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Patch WebView agar tidak blank
        run: |
          # Aktifkan JavaScript & DOM Storage di WebView Android
          MAIN_ACTIVITY=$(find android -name "MainActivity.kt" -o -name "MainActivity.java" 2>/dev/null | head -1)
          
          # Patch build.gradle agar minSdk minimal 22 (hindari blank di Android lama)
          APP_GRADLE="android/app/build.gradle"
          if [ -f "$APP_GRADLE" ]; then
            sed -i 's/minSdkVersion [0-9]*/minSdkVersion 22/' "$APP_GRADLE"
            echo "âœ… minSdkVersion di-patch ke 22"
          fi

      - name: Build APK Debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RENCO-Koperasi-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
